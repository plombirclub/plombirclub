<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Восстановление пароля — ЧИСТАЯ ЛИНИЯ</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body class="auth-page">
  <div class="auth-shell">
    <img class="auth-deco auth-deco--small" src="/images/login-character-small.png" alt="" aria-hidden="true">
    <img class="auth-deco auth-deco--large" src="/images/login-character-large.png" alt="" aria-hidden="true">

    <div class="auth-shell__content">
      <div class="auth-card">
        <h1 class="auth-card__title">Восстановление пароля</h1>
        <p class="auth-card__subtitle">Введите email, указанный при регистрации</p>

        <div id="form-alert"></div>
        <p class="auth-success" id="forgot-success" hidden></p>

        <form id="forgot-form" class="form-grid" novalidate>
          <label class="field">
            <span class="field__label">Email</span>
            <input class="field__input" type="email" name="email" autocomplete="username" required>
          </label>

          <div class="form-actions">
            <button type="submit" class="btn btn--primary" id="forgot-submit">Восстановить</button>
          </div>
        </form>

        <p class="auth-footer-link">
          Вспомнили пароль? <a class="auth-link" href="/pages/login.html">Войти</a>
        </p>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/forgot-password.js"></script>
</body>
</html>

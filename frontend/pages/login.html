<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — ЧИСТАЯ ЛИНИЯ</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body class="auth-page">
  <div class="auth-shell">
    <img class="auth-deco auth-deco--small" src="/images/login-character-small.png" alt="" aria-hidden="true">
    <img class="auth-deco auth-deco--large" src="/images/login-character-large.png" alt="" aria-hidden="true">

    <div class="auth-shell__content">
      <div class="auth-card">
        <h1 class="auth-card__title">Авторизация</h1>
        <p class="auth-card__subtitle">Войдите в личный кабинет</p>

        <div id="form-alert"></div>

        <form id="login-form" class="form-grid" method="post" action="#" novalidate>
          <label class="field">
            <span class="field__label">Email</span>
            <input class="field__input" type="email" name="email" autocomplete="username" required>
          </label>

          <label class="field">
            <span class="field__label">Пароль</span>
            <input class="field__input" type="password" name="password" autocomplete="current-password" required>
          </label>

          <div class="form-row">
            <label class="checkbox-inline">
              <input type="checkbox" name="remember">
              <span>Запомнить</span>
            </label>
            <a class="auth-link" href="/pages/forgot-password.html">Забыли пароль?</a>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn--primary" id="login-submit">Войти</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
